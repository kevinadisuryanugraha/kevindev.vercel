<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Halaman Tidak Ditemukan | Kevin.Dev</title>
    <meta name="description" content="Halaman yang kamu cari tidak ditemukan." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      :root {
        --primary-color: #2563eb;
        --primary-dark: #1d4ed8;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text-dark: #0f172a;
        --text-secondary: #64748b;
        --border: #e2e8f0;
        --primary-rgb: 37, 99, 235;
      }

      [data-theme="dark"] {
        --bg: #0b1121;
        --card-bg: #1a2332;
        --text-dark: #f1f5f9;
        --text-secondary: #94a3b8;
        --border: #2a3a4e;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--bg);
        color: var(--text-dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        transition: background 0.3s ease, color 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      /* Dot pattern background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
        background-size: 32px 32px;
        opacity: 0.5;
        pointer-events: none;
        z-index: 0;
      }

      [data-theme="dark"] body::before {
        background-image: radial-gradient(#1e293b 1.5px, transparent 1.5px);
      }

      /* Glow blob */
      .glow {
        position: fixed;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: pulse-glow 4s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      }

      /* Card */
      .error-card {
        position: relative;
        z-index: 1;
        background: var(--card-bg);
        border-radius: 28px;
        padding: 60px 52px 48px;
        text-align: center;
        max-width: 520px;
        width: 100%;
        border: 1px solid var(--border);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
        animation: card-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes card-in {
        from { opacity: 0; transform: translateY(40px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Top gradient line */
      .error-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary-color), #0ea5e9, #8b5cf6);
        border-radius: 28px 28px 0 0;
      }

      /* 404 Number */
      .error-number {
        font-size: clamp(5rem, 15vw, 8rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, var(--primary-color) 0%, #0ea5e9 50%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -4px;
        margin-bottom: 8px;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      /* Icon */
      .error-icon {
        width: 72px;
        height: 72px;
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(14, 165, 233, 0.1));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        border: 1px solid rgba(var(--primary-rgb), 0.15);
      }

      .error-icon i {
        font-size: 1.8rem;
        color: var(--primary-color);
      }

      /* Text */
      .error-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 12px;
      }

      .error-desc {
        font-size: 0.92rem;
        color: var(--text-secondary);
        line-height: 1.7;
        margin-bottom: 36px;
        max-width: 340px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Buttons */
      .btn-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn-primary-404 {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: linear-gradient(135deg, var(--primary-color), #0ea5e9);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        font-family: "Poppins", sans-serif;
        border: none;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 6px 20px rgba(var(--primary-rgb), 0.3);
      }

      .btn-primary-404:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(var(--primary-rgb), 0.4);
      }

      .btn-outline-404 {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: transparent;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        font-family: "Poppins", sans-serif;
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .btn-outline-404:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
        transform: translateY(-3px);
      }

      /* Link list */
      .quick-links {
        margin-top: 32px;
        padding-top: 28px;
        border-top: 1px solid var(--border);
      }

      .quick-links p {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-secondary);
        margin-bottom: 14px;
      }

      .quick-links-list {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .quick-link {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--primary-color);
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 20px;
        background: rgba(var(--primary-rgb), 0.08);
        border: 1px solid rgba(var(--primary-rgb), 0.15);
        transition: all 0.25s ease;
      }

      .quick-link:hover {
        background: rgba(var(--primary-rgb), 0.15);
        transform: translateY(-2px);
      }

      /* Brand */
      .brand {
        position: fixed;
        top: 24px;
        left: 32px;
        z-index: 10;
        font-size: 1.1rem;
        font-weight: 700;
        text-decoration: none;
        color: var(--text-dark);
      }

      .brand span {
        color: var(--primary-color);
      }

      /* Theme toggle */
      .theme-toggle-404 {
        position: fixed;
        top: 20px;
        right: 28px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--card-bg);
        color: var(--text-dark);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .theme-toggle-404:hover {
        background: var(--primary-color);
        border-color: var(--primary-color);
        color: white;
        transform: rotate(20deg) scale(1.1);
      }

      .theme-toggle-404 .fa-sun { display: none; }
      [data-theme="dark"] .theme-toggle-404 .fa-moon { display: none; }
      [data-theme="dark"] .theme-toggle-404 .fa-sun { display: block; }

      @media (max-width: 480px) {
        .error-card {
          padding: 44px 28px 36px;
        }

        .error-number {
          font-size: 5rem;
        }

        .brand {
          left: 20px;
          top: 20px;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>

    <!-- Brand -->
    <a href="index.html" class="brand">Kevin<span>.Dev</span></a>

    <!-- Theme Toggle -->
    <button class="theme-toggle-404" onclick="toggleTheme()" aria-label="Toggle theme">
      <i class="fas fa-moon"></i>
      <i class="fas fa-sun"></i>
    </button>

    <!-- Error Card -->
    <div class="error-card">
      <div class="error-number">404</div>

      <div class="error-icon">
        <i class="fas fa-map-signs"></i>
      </div>

      <h1 class="error-title">Halaman Tidak Ditemukan</h1>
      <p class="error-desc">
        Sepertinya halaman yang kamu cari sudah dipindahkan, dihapus,
        atau memang tidak pernah ada. Yuk, kembali ke tempat yang lebih familiar!
      </p>

      <div class="btn-group">
        <a href="index.html" class="btn-primary-404">
          <i class="fas fa-home"></i> Ke Beranda
        </a>
        <a href="index.html#contact" class="btn-outline-404">
          <i class="fas fa-paper-plane"></i> Hubungi Saya
        </a>
      </div>

      <div class="quick-links">
        <p>Atau langsung ke:</p>
        <div class="quick-links-list">
          <a href="index.html#about" class="quick-link">Tentang Saya</a>
          <a href="index.html#portfolio" class="quick-link">Portofolio</a>
          <a href="index.html#skills" class="quick-link">Keahlian</a>
          <a href="index.html#certificates" class="quick-link">Sertifikat</a>
        </div>
      </div>
    </div>

    <script>
      // Theme persistence from main site
      const STORAGE_KEY = "kevin-porto-theme";

      function initTheme() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = stored || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      }

      function toggleTheme() {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
      }

      initTheme();
    </script>
  </body>
</html>
